<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Page not found — Tide</title>
<style>
:root{--bg:#0b1410;--card:#11201a;--ink:#f5f1eb;--muted:#9fb3a8;--neon:#5EFFB0;--line:rgba(245,241,235,.12)}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font:16px/1.55 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:520px;text-align:center}
.code{font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
h1{font-size:1.9rem;line-height:1.2;margin:.1em 0 .5em}
p{color:var(--muted);margin:.4em 0 1.6em}
a.btn{display:inline-block;padding:12px 22px;border-radius:10px;background:var(--neon);color:#06231a;font-weight:700;text-decoration:none}
.tide{color:var(--neon);font-weight:700;letter-spacing:.04em}
footer{margin-top:34px;color:var(--muted);font-size:.82rem}
footer a{color:var(--muted)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="code">404 — page not found</div>
    <h1>This sale has gone out with the tide.</h1>
    <p>The page you were after isn't here any more — a shop or centre may have moved on, or the link is out of date. The live tide is always up to date on the home page.</p>
    <a class="btn" href="/">See what's on sale now →</a>
    <footer><span class="tide">Tide</span> · <a href="/">Home</a> · <a href="/privacy">Privacy</a></footer>
  </main>
</body>
</html>
