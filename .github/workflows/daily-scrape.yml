name: Daily Score & Summarise

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC — scorer + summariser run
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  score:
    name: Calculate Tide scores
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node score.js

      # Generates the Centre Intelligence narrative shown beneath each
      # centre's score. Soft-fails if GEMINI_API_KEY is unset; the
      # front-end falls back to a template narrative in that case.
      - name: Generate Centre Intelligence narratives
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node summarise.js
