name: Daily Scrape & Score

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC — scraper runs
    - cron: '0 10 * * *'   # 10:00 UTC — scorer + summariser run (4-hr buffer for scraper)
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  scrape:
    name: Scrape brand sale status
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.js

  score:
    name: Calculate Tide scores
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node score.js

      # Generates the Centre Intelligence narrative shown beneath each
      # centre's score. Soft-fails if GEMINI_API_KEY is unset; the
      # front-end falls back to a template narrative in that case.
      - name: Generate Centre Intelligence narratives
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node summarise.js

      # Belt-and-braces email trigger. The primary trigger is pg_cron inside
      # Supabase (see supabase/migrations/20260516_schedule_emails.sql); this
      # fires the alert passes once more after scoring in case pg_cron isn't
      # enabled on the project. skipDigest keeps the Weekend Digest on its
      # own Friday-evening cron only. Non-fatal — never blocks scoring.
      - name: Trigger email alerts (fallback)
        continue-on-error: true
        env:
          NOTIFY_FUNCTION_URL: ${{ secrets.NOTIFY_FUNCTION_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$NOTIFY_FUNCTION_URL" ]; then
            echo "NOTIFY_FUNCTION_URL secret not set — skipping email trigger"
            exit 0
          fi
          curl -fsS -X POST "$NOTIFY_FUNCTION_URL" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"skipDigest": true}' \
            || echo "notify-high-tide trigger failed (non-fatal)"
