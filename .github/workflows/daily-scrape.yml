name: Daily Scrape & Score

# Two cron triggers + workflow_dispatch for manual runs.
# May 2026 robustness audit additions:
#   - Explicit per-job timeouts (scraper 20m, scorer 10m). Without these a
#     hung Playwright job could sit on the runner for hours and chew through
#     Actions minutes.
#   - workflow_dispatch trigger on the workflow itself (was already present).
#   - Node version pinned to '24' explicitly (Node 18 is EOL, 24 is the
#     June 2026 floor).
#   - notify_failure job runs after the main jobs and, if either failed,
#     writes a 'workflow_failure' row to audit_log so the v_system_health
#     view can surface CI failures without anyone having to dig into the
#     GitHub Actions UI.
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC — scraper runs
    - cron: '0 8 * * *'   # 08:00 UTC — scorer runs (after scraper completes)
  workflow_dispatch:       # Manual trigger from GitHub UI
    inputs:
      job:
        description: 'Which job to run (scrape, score, or both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - scrape
          - score

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: Scrape brand sale status
    runs-on: ubuntu-latest
    # 20 minutes covers a normal run (~6m) plus retry headroom. A run hitting
    # this ceiling is the signal that something is truly stuck.
    timeout-minutes: 20
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'both' || inputs.job == 'scrape'))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.js

  score:
    name: Calculate Tide scores
    runs-on: ubuntu-latest
    # 10 minutes — score.js is pure compute + Supabase writes, normally <1m.
    timeout-minutes: 10
    if: >-
      github.event.schedule == '0 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'both' || inputs.job == 'score'))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node score.js

  # If either job fails (or is cancelled by hitting the timeout-minutes
  # ceiling), record a workflow_failure row in audit_log so v_system_health
  # surfaces the failure. node:24 alpine has fetch built in so we keep the
  # step dependency-free.
  notify_failure:
    name: Record failure in audit_log
    needs: [scrape, score]
    if: always() && (needs.scrape.result == 'failure' || needs.scrape.result == 'cancelled' || needs.score.result == 'failure' || needs.score.result == 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write workflow_failure row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPE_RESULT: ${{ needs.scrape.result }}
          SCORE_RESULT:  ${{ needs.score.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_KEY — cannot record failure"
            exit 0
          fi
          # Build the JSON payload with python's json.dumps so any quote, slash,
          # or unicode character in the env vars is escaped correctly.
          BODY=$(python3 -c "
          import json, os, datetime
          now = datetime.datetime.utcnow()
          print(json.dumps({
            'run_type': 'workflow_failure',
            'run_date': now.strftime('%Y-%m-%d'),
            'run_completed_at': now.strftime('%Y-%m-%dT%H:%M:%SZ'),
            'status': 'failed',
            'error_summary': f\"scrape={os.environ['SCRAPE_RESULT']} score={os.environ['SCORE_RESULT']} run={os.environ['RUN_URL']}\",
            'details': {
              'scrape_result': os.environ['SCRAPE_RESULT'],
              'score_result':  os.environ['SCORE_RESULT'],
              'run_url':       os.environ['RUN_URL'],
            },
          }))
          ")
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/audit_log" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY" || echo "audit_log POST failed (best-effort)"
