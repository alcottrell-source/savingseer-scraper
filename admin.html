<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>Tide · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --bark: #2C1810; --leaf: #3D6B35; --leaf-lt: #EEF4EC;
    --amber: #C17A2B; --amber-lt: #FBF2E4; --red: #B84C3A; --red-lt: #FAEAE7;
    --stone: #8C8070; --stone-lt: #F2EFE9; --border: rgba(44,24,16,0.10);
  }
  html { font-size: 16px; }
  body {
    background: var(--cream); color: var(--bark);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    min-height: 100vh; padding-bottom: 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────────────────────────────────── */
  header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--cream); z-index: 100;
  }
  .wordmark { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--bark); }
  .wordmark span { color: var(--leaf); }
  .wordmark::after { content: ' admin'; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-left: 6px; }
  .header-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--stone); }
  .signout-btn { background: none; border: 1px solid var(--border); color: var(--stone); font-family: inherit; font-size: 12px; padding: 5px 12px; border-radius: 16px; cursor: pointer; }
  .signout-btn:hover { color: var(--bark); border-color: var(--bark); }

  /* ── Login screen ─────────────────────────────────────────────────── */
  .login-wrap {
    min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 24px; max-width: 360px; width: 100%;
  }
  .login-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--bark); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--stone); margin-bottom: 22px; line-height: 1.5; }
  .input {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font: inherit; font-size: 15px; color: var(--bark);
    background: white; margin-bottom: 10px;
  }
  .input:focus { outline: none; border-color: var(--leaf); }
  .btn {
    font: inherit; font-size: 14px; font-weight: 500;
    border-radius: 8px; padding: 11px 18px; cursor: pointer; border: none;
    width: 100%; margin-top: 4px; transition: background 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--leaf); color: white; }
  .btn-primary:hover:not(:disabled) { background: #2f5428; }
  .err { background: var(--red-lt); color: var(--red); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 12px; line-height: 1.45; }

  /* ── Sections ────────────────────────────────────────────────────── */
  .section-bar {
    padding: 18px 20px 8px; display: flex; align-items: baseline; justify-content: space-between;
    position: sticky; top: 53px; background: var(--cream); z-index: 50;
  }
  .section-bar.confirmed { padding-top: 32px; }
  .section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); }
  .section-title.urgent { color: var(--bark); font-weight: 500; }
  .count-pill {
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: 10px;
    background: var(--stone-lt); color: var(--stone);
  }
  .count-pill.urgent { background: var(--amber-lt); color: var(--amber); }

  /* ── Brand row card ─────────────────────────────────────────────── */
  .brand-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .brand-card {
    background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 14px 12px; position: relative;
  }
  .brand-card.confirmed { opacity: 0.62; }
  .brand-card.disagrees::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--amber); border-radius: 14px 0 0 14px;
  }

  .row-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .row-name { font-size: 16px; font-weight: 500; color: var(--bark); line-height: 1.2; }
  .row-tier {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 8px; margin-left: 6px;
    background: var(--stone-lt); color: var(--stone); font-weight: 500;
    display: inline-block; vertical-align: 2px;
  }
  .row-tier.anchor { background: var(--leaf-lt); color: var(--leaf); }
  .row-link { font-size: 11px; color: var(--stone); text-decoration: none; white-space: nowrap; }
  .row-link:hover { color: var(--leaf); }
  .row-link::after { content: ' ↗'; }

  .row-state-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px;
    font-size: 12px; line-height: 1.4; padding: 8px 0 10px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .row-state-cell .state-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--stone); margin-bottom: 1px; }
  .row-state-cell .state-value { color: var(--bark); }
  .state-value.on  { color: var(--leaf); font-weight: 500; }
  .state-value.off { color: var(--stone); }
  .state-value.err { color: var(--red); }
  .state-value.dim { color: var(--stone); font-style: italic; }
  .state-pct { color: var(--amber); font-weight: 500; }
  .state-type { display: inline-block; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--bark); background: var(--stone-lt); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; }

  .row-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .row-actions.with-end { grid-template-columns: 1fr 1fr 1fr; }
  .action-btn {
    font: inherit; font-size: 12px; font-weight: 500;
    border-radius: 8px; padding: 9px 8px; cursor: pointer; border: 1px solid transparent;
    text-align: center; transition: background 0.12s, border 0.12s;
    min-height: 38px;
  }
  .action-btn.primary { background: var(--leaf); color: white; }
  .action-btn.primary:hover { background: #2f5428; }
  .action-btn.danger { background: var(--red-lt); color: var(--red); border-color: rgba(184,76,58,0.18); }
  .action-btn.danger:hover { background: rgba(184,76,58,0.13); }
  .action-btn.muted { background: var(--stone-lt); color: var(--bark); border-color: var(--border); }
  .action-btn.muted:hover { background: #e8e4de; }
  .action-btn.ghost { background: white; color: var(--stone); border-color: var(--border); }
  .action-btn.ghost:hover { color: var(--bark); border-color: var(--bark); }
  .action-btn:disabled { opacity: 0.5; cursor: wait; }

  /* ── Inline confirm-on-sale form ──────────────────────────────────── */
  .inline-form {
    background: var(--leaf-lt); border: 1px solid rgba(61,107,53,0.20);
    border-radius: 10px; padding: 12px; margin-top: 10px;
    display: grid; gap: 8px;
  }
  .inline-form-row { display: flex; gap: 8px; }
  .inline-form-row label { flex: 1; font-size: 11px; color: var(--stone); }
  .inline-form-row .input { padding: 8px 10px; font-size: 14px; margin: 4px 0 0; }
  .inline-form-actions { display: flex; gap: 6px; }
  .inline-form-actions .btn { width: auto; flex: 1; margin-top: 0; padding: 9px; }

  /* ── Empty / loading / status banner ──────────────────────────────── */
  .status-banner { padding: 12px 20px; font-size: 13px; color: var(--stone); }
  .status-banner.error { color: var(--red); background: var(--red-lt); border-bottom: 1px solid rgba(184,76,58,0.15); }
  .empty-section { padding: 24px 20px; text-align: center; font-size: 13px; color: var(--stone); font-style: italic; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bark); color: white; font-size: 13px;
    padding: 10px 18px; border-radius: 24px;
    opacity: 0; transition: opacity 0.2s; z-index: 300; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── Loading screen ───────────────────────────────────────────────── */
  .loading-screen {
    min-height: calc(100vh - 61px);
    display: flex; align-items: center; justify-content: center;
  }
  .loading-dots span {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--stone); margin: 0 4px;
    animation: dot-pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── User-reports (advisory signal) ───────────────────────────────── */
  /* Third state column. Grid widened to 3 in .row-state-grid above is
     applied via this override so Scraper / Verified / Users line up. */
  .row-state-grid { grid-template-columns: 1fr 1fr 1fr; }
  .state-value.users-ended { color: var(--red);   font-weight: 500; }
  .state-value.users-diff  { color: var(--amber); font-weight: 500; }
  .state-value.users-match { color: var(--leaf);  font-weight: 500; }
  .state-value.users-none  { color: var(--stone); font-style: italic; }
  .users-sub { font-size: 10px; color: var(--stone); margin-top: 1px; }

  .user-dist {
    margin: 0 0 10px; padding: 10px 12px;
    background: var(--stone-lt); border: 1px solid var(--border); border-radius: 10px;
  }
  .user-dist-title {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--stone); margin-bottom: 8px;
  }
  .dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .dist-row:last-child { margin-bottom: 0; }
  .dist-label { font-size: 11px; color: var(--bark); width: 52px; flex-shrink: 0; }
  .dist-track { flex: 1; height: 14px; background: white; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .dist-fill { height: 100%; border-radius: 7px 0 0 7px; background: var(--leaf); }
  .dist-fill.dominant { background: var(--amber); }
  .dist-fill.ended { background: var(--red); }
  .dist-count { font-size: 11px; color: var(--stone); width: 18px; text-align: right; flex-shrink: 0; }

  .contextual-action {
    width: 100%; font: inherit; font-size: 12px; font-weight: 500;
    border-radius: 8px; padding: 10px 8px; cursor: pointer;
    border: 1px solid transparent; margin-bottom: 6px; min-height: 38px;
  }
  .contextual-action.ended  { background: var(--red);  color: white; }
  .contextual-action.ended:hover  { background: #a23f30; }
  .contextual-action.update { background: var(--amber); color: white; }
  .contextual-action.update:hover { background: #a8661f; }
  .contextual-action:disabled { opacity: 0.5; cursor: wait; }
  .contextual-cap { font-size: 10px; color: var(--stone); text-align: center; margin: -2px 0 8px; }

  /* ── Queue filter chips ───────────────────────────────────────────── */
  .filter-bar { display: flex; gap: 6px; padding: 0 20px 12px; }
  .filter-chip {
    font: inherit; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: white; color: var(--stone);
    border-radius: 16px; padding: 5px 12px; cursor: pointer;
    transition: background 0.12s, color 0.12s, border 0.12s;
  }
  .filter-chip:hover { color: var(--bark); border-color: var(--bark); }
  .filter-chip.active { background: var(--bark); color: white; border-color: var(--bark); }
  .filter-chip .chip-n { opacity: 0.7; margin-left: 4px; }
  .brand-card.is-hidden { display: none; }

  @media (min-width: 720px) {
    .brand-list { max-width: 720px; margin: 0 auto; }
    .section-bar { max-width: 720px; margin: 0 auto; padding-left: 0; padding-right: 0; }
    .filter-bar { max-width: 720px; margin: 0 auto; padding-left: 0; padding-right: 0; }
    header { padding-left: max(20px, calc((100vw - 720px) / 2)); padding-right: max(20px, calc((100vw - 720px) / 2)); }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">TID<span>E</span></div>
  <div class="header-meta">
    <span id="who" style="display:none"></span>
    <button id="signout-btn" class="signout-btn" style="display:none">Sign out</button>
  </div>
</header>

<div id="status" class="status-banner" style="display:none"></div>

<!-- Loading screen: shown until start() resolves the auth state -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<!-- Login screen -->
<div id="login-screen" class="login-wrap" style="display:none">
  <div class="login-card">
    <div class="login-title">Admin sign in</div>
    <div class="login-sub">Sign in with your Tide account to confirm sale cycles.</div>
    <div id="login-err" class="err" style="display:none"></div>
    <form id="login-form" autocomplete="on">
      <input id="login-email" class="input" type="email" placeholder="Email" autocomplete="email" required>
      <input id="login-pw" class="input" type="password" placeholder="Password" autocomplete="current-password" required>
      <button id="login-btn" class="btn btn-primary" type="submit">Sign in</button>
    </form>
  </div>
</div>

<!-- Main app -->
<main id="app" style="display:none">
  <div class="section-bar">
    <div class="section-title urgent">Needs review</div>
    <div class="count-pill urgent" id="needs-count">0</div>
  </div>
  <div class="filter-bar" id="filter-bar" style="display:none">
    <button class="filter-chip active" data-filter="urgent" id="chip-urgent">Urgent<span class="chip-n" id="n-urgent">0</span></button>
    <button class="filter-chip" data-filter="easy" id="chip-easy">Easy<span class="chip-n" id="n-easy">0</span></button>
    <button class="filter-chip" data-filter="routine" id="chip-routine">Routine<span class="chip-n" id="n-routine">0</span></button>
  </div>
  <div class="brand-list" id="needs-list"></div>
  <div id="needs-empty" class="empty-section" style="display:none">All caught up. Nothing to review today.</div>

  <div class="section-bar confirmed">
    <div class="section-title">Confirmed today</div>
    <div class="count-pill" id="confirmed-count">0</div>
  </div>
  <div class="brand-list" id="confirmed-list"></div>
  <div id="confirmed-empty" class="empty-section" style="display:none">No actions yet today.</div>
</main>

<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from '@supabase/supabase-js';
import { brands as BRAND_DEFS } from './brands.js';

// ── Supabase client (anon key — RLS does the gating) ───────────────────────
const SUPABASE_URL = 'https://vrezzwadwzrmumjpdgge.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_qid8Ej6biCOmKLjLIY5DfA_nzJXmc9G';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// supabase-js's PostgREST calls hang silently in some browser/extension
// combinations. Use raw fetch for table reads/writes; keep supabase-js for
// auth + realtime where it's reliable.
let CURRENT_TOKEN = null;
async function pgFetch(method, path, body, prefer) {
  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: 'Bearer ' + (CURRENT_TOKEN || SUPABASE_ANON_KEY),
  };
  if (body !== undefined) headers['Content-Type'] = 'application/json';
  if (prefer) headers.Prefer = prefer;
  const init = { method, headers };
  if (body !== undefined) init.body = JSON.stringify(body);
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, init);
    if (!r.ok) {
      let text = '';
      try { text = await r.text(); } catch (e) {}
      return { data: null, error: { status: r.status, message: text || r.statusText } };
    }
    if (r.status === 204) return { data: null, error: null };
    const text = await r.text();
    return { data: text ? JSON.parse(text) : null, error: null };
  } catch (e) {
    return { data: null, error: { message: e.message } };
  }
}
const pg = {
  read:   (path) => pgFetch('GET', path),
  insert: (table, body, returnRow) => pgFetch('POST', table + (returnRow ? '?select=*' : ''), body, returnRow ? 'return=representation' : null),
  update: (table, query, body) => pgFetch('PATCH', table + '?' + query, body),
  upsert: (table, body, onConflict) => pgFetch('POST', table + (onConflict ? '?on_conflict=' + onConflict : ''), body, 'resolution=merge-duplicates'),
  delete: (table, query) => pgFetch('DELETE', table + '?' + query),
};

const ANCHOR_BRAND_IDS = new Set(['B001','B002','B003','B011','B012']);
const TODAY = new Date().toISOString().split('T')[0];
const BRAND_BY_ID = Object.fromEntries(BRAND_DEFS.map(b => [b.id, b]));

// Sale-type taxonomy. Keys must match the CHECK constraint in
// supabase/migrations/20260508_add_sale_type.sql.
const SALE_TYPES = [
  { key: 'percent_off',   label: '% off',                short: '% off'   },
  { key: 'flat_discount', label: 'Flat £/$ off',         short: '£ off'   },
  { key: 'bogo',          label: '2 for 1 (BOGO)',       short: '2 for 1' },
  { key: 'bogo_half',     label: '2nd item half price',  short: '2nd ½'   },
  { key: 'multibuy',      label: 'Multibuy / 3 for 2',   short: '3 for 2' },
  { key: 'flash',         label: 'Flash sale',           short: 'Flash'   },
  { key: 'seasonal',      label: 'Seasonal sale',        short: 'Season'  },
];
const SALE_TYPE_LABEL = Object.fromEntries(SALE_TYPES.map(t => [t.key, t.label]));
const SALE_TYPE_SHORT = Object.fromEntries(SALE_TYPES.map(t => [t.key, t.short]));

// ── DOM helpers ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function showStatus(msg, isError) {
  const el = $('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.className = 'status-banner' + (isError ? ' error' : '');
  el.style.display = 'block';
}
let toastTimer;
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Auth flow ──────────────────────────────────────────────────────────────
async function start() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showLogin(); return; }
    await onSignedIn(session);
  } catch (err) {
    $('loading-screen').style.display = 'none';
    showStatus('Could not connect. Please refresh the page. (' + (err.message || err) + ')', true);
  }
}

function showLogin() {
  $('loading-screen').style.display = 'none';
  $('app').style.display = 'none';
  $('login-screen').style.display = 'flex';
  $('signout-btn').style.display = 'none';
  $('who').style.display = 'none';
  showStatus(null);
}

$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = $('login-err');
  errEl.style.display = 'none';
  $('login-btn').disabled = true;
  const email = $('login-email').value.trim();
  const password = $('login-pw').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  $('login-btn').disabled = false;
  if (error) {
    errEl.textContent = error.message || 'Sign-in failed.';
    errEl.style.display = 'block';
    return;
  }
  await onSignedIn(data.session);
});

$('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  showLogin();
});

async function onSignedIn(session) {
  CURRENT_TOKEN = session.access_token;
  $('loading-screen').style.display = 'none';
  $('login-screen').style.display = 'none';
  $('app').style.display = 'block';
  $('signout-btn').style.display = 'inline-block';
  $('who').style.display = 'inline';
  $('who').textContent = session.user.email;

  // Probe admin_review_log to confirm admin access. Run in parallel with
  // the main data load — a failed probe shows a warning but does NOT block
  // the UI. Mutations will still fail via RLS if the user lacks admin rights.
  const [probeRes] = await Promise.all([
    pg.read('admin_review_log?select=id&limit=1'),
    loadAndRender().catch(err => {
      console.error('loadAndRender failed:', err);
      showStatus('Could not load brand data: ' + (err.message || err), true);
    }),
  ]);
  if (probeRes.error) {
    showStatus(
      'Admin access check failed (' + probeRes.error.message + '). '
      + 'If brands loaded below, you can still review — mutations will fail if your account lacks admin rights.',
      true
    );
  }
}

// ── Data load ──────────────────────────────────────────────────────────────
async function loadAndRender() {
  showStatus('Loading…');
  const [eventsRes, cyclesRes, reviewsRes, reportsRes] = await Promise.all([
    pg.read('brand_sale_events?select=brand_id,sale_status,date_first_detected,max_discount_pct,sale_type,scraper_error,last_verified_date,last_verified_status,active_cycle_id'),
    pg.read('brand_sale_cycles?select=id,brand_id,start_date,end_date,max_discount_pct,sale_type&end_date=is.null'),
    pg.read('admin_review_log?select=brand_id,action,created_at&reviewed_date=eq.' + TODAY),
    // Advisory user-report signal. Tolerant: if the view/migration isn't
    // live yet this stays empty and the panel works exactly as before.
    pg.read('user_reports_24h_summary?select=*'),
  ]);
  if (reportsRes.error) {
    console.warn('user_reports_24h_summary unavailable (panel still works):', reportsRes.error.message);
  }
  // The view is keyed by (brand_id, centre_id); the card is per-brand, so
  // fold every centre's row for a brand into one advisory aggregate.
  const reportsByBrand = aggregateReportsByBrand(reportsRes.data || []);

  if (eventsRes.error || cyclesRes.error || reviewsRes.error) {
    showStatus('Load failed: ' + (eventsRes.error || cyclesRes.error || reviewsRes.error).message, true);
    return;
  }

  const evRows = eventsRes.data || [];
  if (evRows.length === 0) {
    showStatus(
      'No brands returned from the database. '
      + 'This usually means a Supabase RLS policy is blocking reads from brand_sale_events. '
      + 'Check that authenticated users have SELECT permission on that table.',
      true
    );
    return;
  }
  showStatus(null);

  const cycleById = new Map((cyclesRes.data || []).map(c => [c.id, c]));
  const reviewByBrand = new Map((reviewsRes.data || []).map(r => [r.brand_id, r]));

  const needs = [];
  const confirmed = [];

  for (const ev of evRows) {
    const def = BRAND_BY_ID[ev.brand_id];
    if (!def) continue;  // Brand removed from brands.js but row still in DB
    const cycle = ev.active_cycle_id ? cycleById.get(ev.active_cycle_id) : null;
    const review = reviewByBrand.get(ev.brand_id);
    const reports = reportsByBrand[ev.brand_id] || null;
    const row = { ev, def, cycle, review, reports };
    if (review) {
      confirmed.push(row);
    } else {
      row.queue = classifyQueue(row);
      needs.push(row);
    }
  }

  // Queue priority (spec §3.C.4): urgent → easy → routine. Within each band
  // keep the legacy tiebreak: scraper-disagrees, then anchors, then alpha.
  const QUEUE_RANK = { urgent: 0, easy: 1, routine: 2 };
  needs.sort((a, b) => {
    if (QUEUE_RANK[a.queue] !== QUEUE_RANK[b.queue]) return QUEUE_RANK[a.queue] - QUEUE_RANK[b.queue];
    const aDis = scraperDisagrees(a.ev) ? 1 : 0;
    const bDis = scraperDisagrees(b.ev) ? 1 : 0;
    if (aDis !== bDis) return bDis - aDis;
    const aAnc = ANCHOR_BRAND_IDS.has(a.ev.brand_id) ? 1 : 0;
    const bAnc = ANCHOR_BRAND_IDS.has(b.ev.brand_id) ? 1 : 0;
    if (aAnc !== bAnc) return bAnc - aAnc;
    return a.def.name.localeCompare(b.def.name);
  });
  const queueCounts = { urgent: 0, easy: 0, routine: 0 };
  for (const r of needs) queueCounts[r.queue]++;

  confirmed.sort((a, b) => new Date(b.review.created_at) - new Date(a.review.created_at));

  $('needs-count').textContent = needs.length;
  $('confirmed-count').textContent = confirmed.length;
  // Per-row try/catch so one bad row doesn't blank the whole list, and any
  // failure is visible inline as a small red card instead of silently empty.
  const safeRender = (r, isConfirmed) => {
    try { return renderRow(r, isConfirmed); }
    catch (err) {
      console.error('renderRow failed for', r.def && r.def.name, err);
      return '<div class="brand-card" style="border-color:var(--red);background:var(--red-lt);">'
        + '<div class="row-name">' + esc((r.def && r.def.name) || r.ev.brand_id) + '</div>'
        + '<div style="font-size:11px;color:var(--red);margin-top:4px;">Render error: ' + esc(err.message) + '</div>'
        + '</div>';
    }
  };
  $('needs-list').innerHTML = needs.map(r => safeRender(r, false)).join('');
  $('confirmed-list').innerHTML = confirmed.map(r => safeRender(r, true)).join('');
  $('needs-empty').style.display = needs.length ? 'none' : 'block';
  $('confirmed-empty').style.display = confirmed.length ? 'none' : 'block';

  // Filter chips: only worth showing once there's a queue to slice.
  $('n-urgent').textContent  = queueCounts.urgent;
  $('n-easy').textContent    = queueCounts.easy;
  $('n-routine').textContent = queueCounts.routine;
  $('filter-bar').style.display = needs.length ? 'flex' : 'none';
  wireFilterChips();
  applyQueueFilter(currentQueueFilter);

  wireRowActions();
}

function scraperDisagrees(ev) {
  if (ev.scraper_error) return false;  // can't disagree with a broken scraper
  if (ev.last_verified_status === null || ev.last_verified_status === undefined) {
    // Never verified — treat as disagreement so it surfaces for first review
    return true;
  }
  return ev.sale_status !== ev.last_verified_status;
}

// ── User-reports advisory signal ──────────────────────────────────────────
// The 24h view is keyed by (brand_id, centre_id). Cards are per-brand, so
// fold a brand's centre rows into one aggregate (sum counts, merge the
// discount distribution, keep the freshest timestamp).
function aggregateReportsByBrand(rows) {
  const out = {};
  for (const r of rows) {
    let a = out[r.brand_id];
    if (!a) a = out[r.brand_id] = {
      count_ended: 0, count_started: 0, count_confirmed: 0,
      count_no_sale_confirmed: 0, count_discount_different: 0,
      total_reports: 0, most_recent_at: null, discount_distribution: {},
    };
    a.count_ended              += +r.count_ended || 0;
    a.count_started            += +r.count_started || 0;
    a.count_confirmed          += +r.count_confirmed || 0;
    a.count_no_sale_confirmed  += +r.count_no_sale_confirmed || 0;
    a.count_discount_different += +r.count_discount_different || 0;
    a.total_reports            += +r.total_reports || 0;
    if (r.most_recent_at && (!a.most_recent_at || r.most_recent_at > a.most_recent_at)) {
      a.most_recent_at = r.most_recent_at;
    }
    const dd = r.discount_distribution || {};
    for (const k of Object.keys(dd)) a.discount_distribution[k] = (a.discount_distribution[k] || 0) + (+dd[k] || 0);
  }
  return out;
}

// The single loudest user signal for a brand. For discounts, the modal % bucket.
function dominantSignal(rep) {
  if (!rep || !rep.total_reports) return null;
  let domPct = null, domPctCount = 0;
  const dd = rep.discount_distribution || {};
  for (const k of Object.keys(dd)) {
    const c = +dd[k] || 0;
    if (c > domPctCount || (c === domPctCount && Number(k) > Number(domPct))) { domPctCount = c; domPct = Number(k); }
  }
  const cands = [
    { kind: 'ended',             count: rep.count_ended || 0 },
    { kind: 'started',           count: rep.count_started || 0 },
    { kind: 'confirmed',         count: rep.count_confirmed || 0 },
    { kind: 'no_sale_confirmed', count: rep.count_no_sale_confirmed || 0 },
    { kind: 'discount',          count: domPctCount, pct: domPct },
  ];
  cands.sort((a, b) => b.count - a.count);
  return cands[0].count > 0 ? cands[0] : null;
}

// Queue band (spec §3.C.4). routine = no user signal (status quo);
// urgent = users contradict the scraper, or scraper errored with any signal;
// easy = users agree with the scraper.
function classifyQueue({ ev, cycle, reports }) {
  const dom = dominantSignal(reports);
  if (!dom) return 'routine';
  if (ev.scraper_error) return 'urgent';
  const scraperOn = !!ev.sale_status;
  const curPct = cycle ? cycle.max_discount_pct : ev.max_discount_pct;
  let disagree;
  switch (dom.kind) {
    case 'ended':             disagree = scraperOn; break;
    case 'no_sale_confirmed': disagree = scraperOn; break;
    case 'started':           disagree = !scraperOn; break;
    case 'confirmed':         disagree = !scraperOn; break;
    case 'discount':          disagree = !scraperOn || (dom.pct != null && Number(curPct) !== Number(dom.pct)); break;
    default:                  disagree = false;
  }
  return disagree ? 'urgent' : 'easy';
}

function relTime(iso) {
  if (!iso) return '';
  const m = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.round(h / 24) + 'd ago';
}

function renderUsersCell(reports, ev, cycle) {
  if (!reports || !reports.total_reports) return '<span class="state-value users-none">No reports</span>';
  const dom = dominantSignal(reports);
  if (!dom) return '<span class="state-value users-none">No reports</span>';
  const curPct = cycle ? cycle.max_discount_pct : ev.max_discount_pct;
  const verifiedOn = cycle ? true : (ev.last_verified_status === true);
  let cls = 'users-match', txt;
  if (dom.kind === 'ended') { cls = 'users-ended'; txt = dom.count + ' say ended'; }
  else if (dom.kind === 'discount') {
    const match = dom.pct != null && Number(curPct) === Number(dom.pct);
    cls = match ? 'users-match' : 'users-diff';
    txt = dom.count + ' say ' + dom.pct + '%';
  }
  else if (dom.kind === 'confirmed')         { cls = verifiedOn ? 'users-match' : 'users-diff'; txt = dom.count + ' confirmed'; }
  else if (dom.kind === 'no_sale_confirmed') { cls = !verifiedOn ? 'users-match' : 'users-diff'; txt = dom.count + ' say no sale'; }
  else if (dom.kind === 'started')           { cls = verifiedOn ? 'users-match' : 'users-diff'; txt = dom.count + ' say on sale'; }
  else { return '<span class="state-value users-none">No reports</span>'; }
  const sub = reports.most_recent_at
    ? '<div class="users-sub">most recent ' + esc(relTime(reports.most_recent_at)) + '</div>' : '';
  return '<span class="state-value ' + cls + '">' + esc(txt) + '</span>' + sub;
}

function renderDistribution(reports) {
  if (!reports || !reports.total_reports) return '';
  const dd = reports.discount_distribution || {};
  const pcts = Object.keys(dd)
    .map(k => ({ label: k + '%', count: +dd[k] || 0, kind: 'pct', v: Number(k) }))
    .filter(r => r.count > 0)
    .sort((a, b) => b.count - a.count || b.v - a.v);
  const rows = pcts.slice();
  if ((reports.count_ended || 0) > 0) rows.push({ label: 'Ended', count: reports.count_ended, kind: 'ended' });
  if (!rows.length) return '';
  const max = Math.max(...rows.map(r => r.count));
  const domPct = pcts.length ? pcts[0].v : null;
  let html = '<div class="user-dist"><div class="user-dist-title">In-store discount reports (24h)</div>';
  for (const r of rows) {
    const w = Math.max(6, Math.round((r.count / max) * 100));
    const fillCls = r.kind === 'ended' ? 'ended' : (r.v === domPct ? 'dominant' : '');
    html += '<div class="dist-row"><div class="dist-label">' + esc(r.label) + '</div>'
          + '<div class="dist-track"><div class="dist-fill ' + fillCls + '" style="width:' + w + '%"></div></div>'
          + '<div class="dist-count">' + r.count + '</div></div>';
  }
  return html + '</div>';
}

// Pre-filled primary action when ≥2 users agree. Routes through the existing
// confirm_end / applyEdit paths — NOT reset_brand_sale_cycle(): that RPC is
// service_role-only (admin.html is an authenticated session) and it nulls
// date_first_detected, which is sacred (spec §2.1). Same visible outcome.
function renderContextualButton(reports, ev, cycle) {
  const dom = dominantSignal(reports);
  if (!dom || dom.count < 2) return '';
  if (dom.kind === 'ended') {
    return '<button class="contextual-action ended" data-action="user_mark_ended">Mark ended</button>'
         + '<div class="contextual-cap">' + dom.count + ' users report the sale ended</div>';
  }
  if (dom.kind === 'discount') {
    const curPct = cycle ? cycle.max_discount_pct : ev.max_discount_pct;
    if (dom.pct != null && Number(curPct) !== Number(dom.pct)) {
      return '<button class="contextual-action update" data-action="user_update_pct" data-pct="' + esc(dom.pct) + '">Update to ' + esc(dom.pct) + '%</button>'
           + '<div class="contextual-cap">' + dom.count + ' users saw ' + esc(dom.pct) + '% in store</div>';
    }
  }
  return '';
}

// ── Row renderer ──────────────────────────────────────────────────────────
function renderRow({ ev, def, cycle, review, reports, queue }, isConfirmed) {
  const tier = ANCHOR_BRAND_IDS.has(ev.brand_id) ? 'Anchor' : (def.cluster || '');
  const tierClass = ANCHOR_BRAND_IDS.has(ev.brand_id) ? ' anchor' : '';

  let scraperHtml;
  if (ev.scraper_error) {
    scraperHtml = '<span class="state-value err">Error</span>';
  } else if (ev.sale_status) {
    const pct = ev.max_discount_pct ? ' <span class="state-pct">' + ev.max_discount_pct + '%</span>' : '';
    scraperHtml = '<span class="state-value on">On sale</span>' + pct;
  } else {
    scraperHtml = '<span class="state-value off">No sale</span>';
  }

  let verifiedHtml;
  if (cycle) {
    const days = daysSince(cycle.start_date);
    const pct = cycle.max_discount_pct ? ' · <span class="state-pct">' + cycle.max_discount_pct + '%</span>' : '';
    const typeLabel = SALE_TYPE_SHORT[cycle.sale_type] || SALE_TYPE_SHORT.percent_off;
    const typeChip = ' · <span class="state-type">' + esc(typeLabel) + '</span>';
    verifiedHtml = '<span class="state-value on">On sale</span> · day ' + days + pct + typeChip;
  } else if (ev.last_verified_date) {
    verifiedHtml = (ev.last_verified_status
        ? '<span class="state-value on">On sale</span>'
        : '<span class="state-value off">No sale</span>')
      + ' <span class="state-value dim">· ' + relDate(ev.last_verified_date) + '</span>';
  } else {
    verifiedHtml = '<span class="state-value dim">Never verified</span>';
  }

  const actions = isConfirmed
    ? renderConfirmedNote(review, cycle)
    : renderActionButtons(ev, cycle);

  const cardClass = 'brand-card'
    + (isConfirmed ? ' confirmed' : '')
    + (!isConfirmed && scraperDisagrees(ev) ? ' disagrees' : '');

  const usersHtml = renderUsersCell(reports, ev, cycle);
  const distHtml = isConfirmed ? '' : renderDistribution(reports);
  const contextualHtml = isConfirmed ? '' : renderContextualButton(reports, ev, cycle);

  return '' +
    '<div class="' + cardClass + '" data-brand-id="' + esc(ev.brand_id) + '"'
    + (queue ? ' data-queue="' + esc(queue) + '"' : '')
    + (cycle ? ' data-cycle-id="'    + esc(cycle.id)                          + '"'
             + ' data-cycle-start="' + esc(cycle.start_date)                  + '"'
             + ' data-cycle-pct="'   + esc(cycle.max_discount_pct ?? '')      + '"'
             + ' data-cycle-type="'  + esc(cycle.sale_type ?? 'percent_off')  + '"' : '')
    + '>' +
      '<div class="row-top">' +
        '<div class="row-name">' + esc(def.name) +
          (tier ? '<span class="row-tier' + tierClass + '">' + esc(tier) + '</span>' : '') +
        '</div>' +
        (def.url ? '<a class="row-link" href="' + esc(def.url) + '" target="_blank" rel="noopener">open shop</a>' : '') +
      '</div>' +
      '<div class="row-state-grid">' +
        '<div class="row-state-cell"><div class="state-label">Scraper</div>' + scraperHtml + '</div>' +
        '<div class="row-state-cell"><div class="state-label">Verified</div>' + verifiedHtml + '</div>' +
        '<div class="row-state-cell"><div class="state-label">Users</div>' + usersHtml + '</div>' +
      '</div>' +
      distHtml +
      contextualHtml +
      actions +
      '<div class="inline-form-mount"></div>' +
    '</div>';
}

function renderActionButtons(ev, cycle) {
  // If there's an active cycle, the relevant verbs are: "Still on" / "Sale
  // ended" / "Dismiss" (scraper blipped) — plus an Edit button so an admin
  // can correct a wrong % or start_date on an existing cycle without first
  // having to re-confirm it (which used to be the only way to expose the
  // editor that lives in renderConfirmedNote).
  if (cycle) {
    return '<div class="row-actions with-end">' +
      '<button class="action-btn primary" data-action="confirm_on">Still on</button>' +
      '<button class="action-btn danger"  data-action="confirm_end">Sale ended</button>' +
      '<button class="action-btn ghost"   data-action="dismiss">Dismiss</button>' +
      '<button class="action-btn ghost"   data-action="edit_cycle" style="width:auto;padding:5px 12px;margin:0;font-size:11px;">Edit</button>' +
    '</div>';
  }
  // No active cycle — choose between starting one or confirming no sale.
  return '<div class="row-actions with-end">' +
    '<button class="action-btn primary" data-action="confirm_start">Confirm on sale</button>' +
    '<button class="action-btn muted"   data-action="confirm_off">No sale</button>' +
    '<button class="action-btn ghost"   data-action="dismiss">Dismiss</button>' +
  '</div>';
}

function renderConfirmedNote(review, cycle) {
  const pretty = {
    confirmed_start: 'Confirmed sale started',
    confirmed_end:   'Confirmed sale ended',
    confirmed_on:    'Confirmed still on sale',
    confirmed_off:   'Confirmed no sale',
    dismissed:       'Dismissed',
    edited:          'Edited',
    deleted:         'Cycle deleted',
  }[review.action] || review.action;
  const time = new Date(review.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const editBtn = cycle
    ? '<button class="action-btn ghost" data-action="edit_cycle" style="width:auto;padding:5px 12px;margin:0;font-size:11px;">Edit</button>'
    : '';
  return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;color:var(--stone);">'
    + '<span>' + esc(pretty) + ' · ' + esc(time) + '</span>'
    + editBtn
    + '</div>';
}

// ── Action wiring ─────────────────────────────────────────────────────────
function wireRowActions() {
  document.querySelectorAll('.brand-card[data-brand-id]').forEach(card => {
    card.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleAction(card, btn));
    });
  });
}

async function handleAction(card, btn) {
  const brandId = card.dataset.brandId;
  const action = btn.dataset.action;
  const def = BRAND_BY_ID[brandId];
  // For "confirm_start" and "edit_cycle" we open an inline form first.
  if (action === 'confirm_start') {
    openStartForm(card, brandId, def);
    return;
  }
  if (action === 'edit_cycle') {
    openEditForm(card, brandId, def);
    return;
  }
  // Contextual user-report buttons reuse the existing sanctioned write paths.
  // user_mark_ended  → confirm_end (closes cycle, verified-off; never touches
  //                     date_first_detected).
  // user_update_pct  → applyEdit (mirrors max_discount_pct; preserves
  //                     date_first_detected and the existing cycle dates).
  if (action === 'user_mark_ended') {
    setRowBusy(card, true);
    try {
      await applyAction(brandId, 'confirm_end', {});
      triggerRescore();
      toast('Sale ended · ' + def.name);
      await loadAndRender();
    } catch (err) {
      showStatus('Action failed: ' + err.message, true);
      setRowBusy(card, false);
    }
    return;
  }
  if (action === 'user_update_pct') {
    const pct = Number(btn.dataset.pct);
    setRowBusy(card, true);
    try {
      await applyEdit(brandId, card.dataset.cycleId || null, {
        start_date: card.dataset.cycleStart || TODAY,
        max_discount_pct: pct,
        sale_type: card.dataset.cycleType || 'percent_off',
      });
      triggerRescore();
      toast('Updated to ' + pct + '% · ' + def.name);
      await loadAndRender();
    } catch (err) {
      showStatus('Action failed: ' + err.message, true);
      setRowBusy(card, false);
    }
    return;
  }
  setRowBusy(card, true);
  try {
    await applyAction(brandId, action, {});
    triggerRescore();
    toast(prettyAction(action) + ' · ' + def.name);
    await loadAndRender();
  } catch (err) {
    showStatus('Action failed: ' + err.message, true);
    setRowBusy(card, false);
  }
}

// ── Queue filter chips ────────────────────────────────────────────────────
let currentQueueFilter = 'urgent';
function wireFilterChips() {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.onclick = () => applyQueueFilter(chip.dataset.filter);
  });
}
function applyQueueFilter(filter) {
  currentQueueFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === filter);
  });
  document.querySelectorAll('#needs-list .brand-card[data-queue]').forEach(card => {
    card.classList.toggle('is-hidden', card.dataset.queue !== filter);
  });
  const visible = document.querySelectorAll('#needs-list .brand-card:not(.is-hidden)').length;
  const empty = $('needs-empty');
  empty.style.display = visible ? 'none' : 'block';
  empty.textContent = visible
    ? ''
    : (document.querySelectorAll('#needs-list .brand-card').length
        ? 'Nothing in "' + filter + '". Try another tab.'
        : 'All caught up. Nothing to review today.');
}

function prettyAction(a) {
  return ({
    confirm_start: 'Sale started',
    confirm_end:   'Sale ended',
    confirm_on:    'Still on sale',
    confirm_off:   'Confirmed off',
    dismiss:       'Dismissed',
  })[a] || a;
}

function setRowBusy(card, busy) {
  card.querySelectorAll('button').forEach(b => b.disabled = busy);
}

function saleTypeOptions(selected) {
  const sel = selected || 'percent_off';
  return SALE_TYPES.map(t =>
    '<option value="' + esc(t.key) + '"' + (t.key === sel ? ' selected' : '') + '>' + esc(t.label) + '</option>'
  ).join('');
}

function openStartForm(card, brandId, def) {
  const mount = card.querySelector('.inline-form-mount');
  // Fetch latest scraped pct as the prefill
  const ev = card.__ev || null;
  const prefilledPct = (ev && ev.max_discount_pct) || '';
  mount.innerHTML =
    '<div class="inline-form">' +
      '<div class="inline-form-row">' +
        '<label>Started <input class="input" type="date" id="frm-start" value="' + TODAY + '"></label>' +
        '<label>Sale type <select class="input" id="frm-type">' + saleTypeOptions('percent_off') + '</select></label>' +
        '<label>Discount % <input class="input" type="number" id="frm-pct" min="1" max="99" placeholder="e.g. 30" value="' + esc(prefilledPct) + '"></label>' +
      '</div>' +
      '<div class="inline-form-actions">' +
        '<button class="btn btn-primary" id="frm-save">Save cycle</button>' +
        '<button class="btn" id="frm-cancel" style="background:var(--stone-lt);color:var(--bark)">Cancel</button>' +
      '</div>' +
    '</div>';

  mount.querySelector('#frm-cancel').addEventListener('click', () => { mount.innerHTML = ''; });
  mount.querySelector('#frm-save').addEventListener('click', async () => {
    const startDate = mount.querySelector('#frm-start').value;
    const pct = mount.querySelector('#frm-pct').value;
    const saleType = mount.querySelector('#frm-type').value;
    if (!startDate) { toast('Pick a start date'); return; }
    setRowBusy(card, true);
    try {
      await applyAction(brandId, 'confirm_start', {
        start_date: startDate,
        max_discount_pct: pct ? parseInt(pct, 10) : null,
        sale_type: saleType,
      });
      triggerRescore();
      toast('Sale cycle saved · ' + def.name);
      await loadAndRender();
    } catch (err) {
      showStatus('Save failed: ' + err.message, true);
      setRowBusy(card, false);
    }
  });
}

function openEditForm(card, brandId, def) {
  const mount = card.querySelector('.inline-form-mount');
  const cycleId    = card.dataset.cycleId    || null;
  const currentStart = card.dataset.cycleStart || TODAY;
  const currentPct   = card.dataset.cyclePct   || '';
  const currentType  = card.dataset.cycleType  || 'percent_off';
  mount.innerHTML =
    '<div class="inline-form">' +
      '<div class="inline-form-row">' +
        '<label>Started <input class="input" type="date" id="edit-start" value="' + esc(currentStart) + '"></label>' +
        '<label>Sale type <select class="input" id="edit-type">' + saleTypeOptions(currentType) + '</select></label>' +
        '<label>Discount % <input class="input" type="number" id="edit-pct" min="1" max="99" placeholder="e.g. 30" value="' + esc(currentPct) + '"></label>' +
      '</div>' +
      '<div class="inline-form-actions">' +
        '<button class="btn btn-primary" id="edit-save">Save changes</button>' +
        '<button class="btn" id="edit-cancel" style="background:var(--stone-lt);color:var(--bark)">Cancel</button>' +
        (cycleId ? '<button class="btn" id="edit-delete" style="margin-left:auto;background:transparent;color:var(--red);border:1px solid var(--red)">Delete cycle</button>' : '') +
      '</div>' +
    '</div>';
  mount.querySelector('#edit-cancel').addEventListener('click', () => { mount.innerHTML = ''; });
  mount.querySelector('#edit-save').addEventListener('click', async () => {
    const startDate = mount.querySelector('#edit-start').value;
    const pct = mount.querySelector('#edit-pct').value;
    const saleType = mount.querySelector('#edit-type').value;
    if (!startDate) { toast('Pick a start date'); return; }
    setRowBusy(card, true);
    try {
      await applyEdit(brandId, cycleId, {
        start_date: startDate,
        max_discount_pct: pct ? parseInt(pct, 10) : null,
        sale_type: saleType,
      });
      triggerRescore();
      toast('Updated · ' + def.name);
      await loadAndRender();
    } catch (err) {
      showStatus('Edit failed: ' + err.message, true);
      setRowBusy(card, false);
    }
  });
  const deleteBtn = mount.querySelector('#edit-delete');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', async () => {
      if (!confirm('Delete this sale cycle entirely?\n\nThe brand will be reset to "no active sale" and the cycle row will be removed.')) return;
      setRowBusy(card, true);
      try {
        await deleteCycle(brandId, cycleId);
        triggerRescore();
        toast('Cycle deleted · ' + def.name);
        await loadAndRender();
      } catch (err) {
        showStatus('Delete failed: ' + err.message, true);
        setRowBusy(card, false);
      }
    });
  }
}

// ── Mutations ─────────────────────────────────────────────────────────────
// Each action does (1) the cycle/event mutation, then (2) the review log row.
// Fire-and-forget the public-site rescore so the score / vessel / chart on
// tidego.co reflects the admin edit within a couple of seconds — no waiting
// for the 08:00 UTC cron. Carry-forward in score.js means only the centres
// containing this brand actually recompute; everything else mirrors yesterday.
function triggerRescore() {
  fetch('/api/rescore', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}',
  }).then(async r => {
    if (!r.ok) console.warn('Rescore returned HTTP', r.status, await r.text().catch(() => ''));
  }).catch(err => console.warn('Rescore call failed:', err));
}

async function applyAction(brandId, action, opts) {
  if (action === 'confirm_start') {
    const { data: cycleRows, error: cErr } = await pg.insert('brand_sale_cycles', {
      brand_id: brandId,
      start_date: opts.start_date,
      max_discount_pct: opts.max_discount_pct,
      sale_type: opts.sale_type || 'percent_off',
      source: 'admin',
    }, true);
    if (cErr) throw cErr;
    const cycle = (cycleRows || [])[0];
    if (!cycle) throw new Error('Insert returned no row');
    const { error: uErr } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
      active_cycle_id: cycle.id,
      last_verified_status: true,
      last_verified_date: TODAY,
      sale_type: opts.sale_type || 'percent_off',
    });
    if (uErr) throw uErr;
    await logReview(brandId, 'confirmed_start', cycle.id);
    return;
  }

  if (action === 'confirm_end') {
    // Close the open cycle, clear FK on event, mark verified-off.
    const { data: openCycles, error: lookupErr } = await pg.read(
      'brand_sale_cycles?select=id&brand_id=eq.' + brandId + '&end_date=is.null&order=start_date.desc&limit=1'
    );
    if (lookupErr) throw lookupErr;
    const openCycle = (openCycles || [])[0];
    if (openCycle) {
      const { error: cErr } = await pg.update('brand_sale_cycles', 'id=eq.' + openCycle.id, { end_date: TODAY });
      if (cErr) throw cErr;
    }
    const { error: uErr } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
      active_cycle_id: null,
      last_verified_status: false,
      last_verified_date: TODAY,
      sale_type: null,
    });
    if (uErr) throw uErr;
    await logReview(brandId, 'confirmed_end', openCycle ? openCycle.id : null);
    return;
  }

  if (action === 'confirm_on') {
    // Re-affirm the existing on-sale state (no cycle change).
    const { error } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
      last_verified_status: true, last_verified_date: TODAY,
    });
    if (error) throw error;
    await logReview(brandId, 'confirmed_on', null);
    return;
  }

  if (action === 'confirm_off') {
    const { error } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
      last_verified_status: false, last_verified_date: TODAY,
    });
    if (error) throw error;
    await logReview(brandId, 'confirmed_off', null);
    return;
  }

  if (action === 'dismiss') {
    // No state change — just log it so the row leaves needs-review for today.
    await logReview(brandId, 'dismissed', null);
    return;
  }

  throw new Error('Unknown action: ' + action);
}

async function applyEdit(brandId, cycleId, opts) {
  if (cycleId) {
    const { error: cErr } = await pg.update('brand_sale_cycles', 'id=eq.' + cycleId, {
      start_date: opts.start_date,
      max_discount_pct: opts.max_discount_pct,
      sale_type: opts.sale_type || 'percent_off',
    });
    if (cErr) throw cErr;
  }
  // Mirror max_discount_pct + sale_type on brand_sale_events as a denormalised
  // cache for admin queries (the main app reads them from the cycle, not here).
  // Bumping last_verified_date confirms this edit counts as today's review.
  const { error: uErr } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
    max_discount_pct: opts.max_discount_pct,
    sale_type: opts.sale_type || 'percent_off',
    last_verified_date: TODAY,
  });
  if (uErr) throw uErr;
  await logReview(brandId, 'edited', cycleId);
}

// Hard-delete a cycle the admin created by mistake. Clears the FK on
// brand_sale_events first (set NULL would otherwise be needed at the DB
// level), resets the verification state to "no sale today" so the brand
// goes back to "Needs review", then removes the brand_sale_cycles row.
async function deleteCycle(brandId, cycleId) {
  // 1. Clear the FK + verification state on brand_sale_events so deleting
  //    the cycle doesn't violate any relational constraints, and so the
  //    score pipeline immediately stops counting this brand as on-sale.
  const { error: uErr } = await pg.update('brand_sale_events', 'brand_id=eq.' + brandId, {
    active_cycle_id: null,
    last_verified_status: false,
    last_verified_date: TODAY,
    max_discount_pct: null,
    sale_type: null,
  });
  if (uErr) throw uErr;
  // 2. Delete the cycle row itself.
  const { error: dErr } = await pg.delete('brand_sale_cycles', 'id=eq.' + cycleId);
  if (dErr) throw dErr;
  // 3. Log the action so the brand leaves "needs review" today.
  await logReview(brandId, 'deleted', cycleId);
}

async function logReview(brandId, action, cycleId) {
  const { error } = await pg.upsert(
    'admin_review_log',
    { brand_id: brandId, reviewed_date: TODAY, action, cycle_id: cycleId },
    'brand_id,reviewed_date'
  );
  if (error) throw error;
}

// ── Date helpers ──────────────────────────────────────────────────────────
function daysSince(dateStr) {
  if (!dateStr) return '—';
  return Math.floor((new Date(TODAY) - new Date(dateStr)) / 86400000) + 1;
}
function relDate(dateStr) {
  if (!dateStr) return '';
  const d = Math.floor((new Date(TODAY) - new Date(dateStr)) / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return 'yesterday';
  return d + ' days ago';
}

start();
</script>
