name: Daily Score & Summarise

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC — scorer + summariser run
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  score:
    name: Calculate Tide scores
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node score.js

      # Generates the Centre Intelligence narrative shown beneath each
      # centre's score (Claude Haiku 4.5). Soft-fails if ANTHROPIC_API_KEY is
      # unset; the front-end falls back to a template narrative in that case.
      - name: Generate Centre Intelligence narratives
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node summarise.js

      # Rebuild the static SEO pages with today's fresh scores. Vercel only
      # rebuilds on git push, so without this every /centre/ page (and the
      # sitemap's <lastmod>) freezes at the last deploy — pages titled
      # "sales today" decay from the moment they ship (seo/README.md item 4).
      # VERCEL_DEPLOY_HOOK_URL is a repo secret holding a Vercel Deploy Hook
      # (Project Settings → Git → Deploy Hooks). Soft-skips with a warning if
      # the secret isn't set, so the scorer itself never fails on this.
      - name: Trigger Vercel rebuild of SEO pages
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL secret not set — static SEO pages stay frozen at the last git push."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" -o /dev/null
          echo "Vercel rebuild triggered — SEO pages refresh with today's scores."
