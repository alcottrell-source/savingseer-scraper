name: Deploy Supabase functions

# Auto-deploys Supabase Edge Functions when their source changes on `main`.
#
# Edge functions live in `supabase/functions/` and are NOT served by Vercel —
# merging to `main` ships the static site, but a function only updates when the
# Supabase CLI redeploys it. This workflow closes that gap: any push to `main`
# that touches a function (or this workflow) redeploys the affected function so
# prod never silently runs stale function code.
#
# One-time setup: add a repo secret `SUPABASE_ACCESS_TOKEN` — a personal access
# token from https://supabase.com/dashboard/account/tokens. The project ref is
# public (it's in the repo already) so it's set as an env default below; you can
# override it with a `SUPABASE_PROJECT_REF` secret if the project ever moves.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function to deploy (blank = all changed on this push; ignored for manual runs, which deploy notify-high-tide)'
        required: false
        default: 'notify-high-tide'
        type: string

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Public project ref — overridable via secret if the project moves.
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'vrezzwadwzrmumjpdgge' }}
    steps:
      - name: Fail early if the access token is missing
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add a personal access token"
            echo "::error::from https://supabase.com/dashboard/account/tokens as a repo secret."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the previous commit so we can diff which functions changed.
          fetch-depth: 2

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine which functions to deploy
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run — deploy exactly the requested function.
            FN="${{ github.event.inputs.function }}"
            echo "Manual dispatch → deploying: ${FN}"
            printf '%s\n' "${FN}" > functions.txt
          else
            # Push — deploy every function with changed files in this push.
            # If only the workflow file changed, fall back to notify-high-tide.
            BEFORE="${{ github.event.before }}"
            if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BEFORE="HEAD^"
            fi
            git diff --name-only "${BEFORE}" "${{ github.sha }}" \
              | grep '^supabase/functions/' \
              | sed -E 's#^supabase/functions/([^/]+)/.*#\1#' \
              | sort -u > functions.txt || true
            if [ ! -s functions.txt ]; then
              echo "No function dirs changed (workflow-only change) → deploying notify-high-tide"
              echo "notify-high-tide" > functions.txt
            fi
            echo "Changed functions:"
            cat functions.txt
          fi

      - name: Deploy
        run: |
          set -euo pipefail
          while IFS= read -r fn; do
            [ -z "${fn}" ] && continue
            if [ ! -d "supabase/functions/${fn}" ]; then
              echo "::warning::supabase/functions/${fn} does not exist — skipping"
              continue
            fi
            echo "── Deploying ${fn} ──"
            supabase functions deploy "${fn}" --project-ref "${PROJECT_REF}"
          done < functions.txt
